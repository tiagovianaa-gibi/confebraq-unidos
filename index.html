<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CONFEBRAQ | Confederação Brasileira de Entidades de Quadrilhas Juninas</title>
    <meta
      name="description"
      content="Site institucional da CONFEBRAQ com notícias, entidades filiadas, histórico do concurso nacional e área de transparência."
    />
    <meta name="author" content="CONFEBRAQ" />
    <meta name="theme-color" content="#1d2b6b" />
    <meta property="og:title" content="CONFEBRAQ" />
    <meta
      property="og:description"
      content="Confederação Brasileira de Entidades de Quadrilhas Juninas."
    />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="CONFEBRAQ" />
    <meta
      name="twitter:description"
      content="Site institucional da Confederação Brasileira de Entidades de Quadrilhas Juninas."
    />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="shortcut icon" href="./favicon.ico" />
    <link rel="apple-touch-icon" href="./favicon.png" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      window.__confebraqAppBooted = false;
      window.__confebraqDistFallbackLoaded = false;
      window.__confebraqShouldUseDistFallback =
        /^(localhost|127\.0\.0\.1)$/.test(window.location.hostname) &&
        /^55\d\d$/.test(window.location.port);

      if (
        window.__confebraqShouldUseDistFallback &&
        /\/index\.html$/.test(window.location.pathname)
      ) {
        window.history.replaceState({}, "", "/");
      }

      window.__confebraqLoadDistFallback = function () {
        if (
          !window.__confebraqShouldUseDistFallback ||
          window.__confebraqAppBooted ||
          window.__confebraqDistFallbackLoaded
        ) {
          return;
        }

        window.__confebraqDistFallbackLoaded = true;

        var rootElement = document.getElementById("root");
        if (rootElement) {
          rootElement.innerHTML =
            '<div style="padding:24px;font-family:system-ui,sans-serif;color:#1d2b6b">Carregando versão estática...</div>';
        }

        var stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = "/dist/assets/app.css";
        document.head.appendChild(stylesheet);

        var script = document.createElement("script");
        script.type = "module";
        script.src = "/dist/assets/main.js";
        script.onerror = function () {
          if (!rootElement) {
            return;
          }

          rootElement.innerHTML =
            '<div style="padding:24px;font-family:system-ui,sans-serif;line-height:1.6;color:#1d2b6b"><strong>Este projeto usa Vite.</strong><br />Para desenvolver, rode <code>npm run dev</code> e abra <code>http://localhost:8080</code>.<br />Se quiser usar o Go Live, gere antes o build com <code>npm run build</code>.</div>';
        };

        document.body.appendChild(script);
      };

      window.setTimeout(function () {
        window.__confebraqLoadDistFallback();
      }, 1200);
    </script>
    <script type="module">
      if (!window.__confebraqShouldUseDistFallback) {
        import("./src/main.tsx").catch(function () {
          window.__confebraqLoadDistFallback && window.__confebraqLoadDistFallback();
        });
      } else {
        window.__confebraqLoadDistFallback();
      }
    </script>
  </body>
</html>
